site_name: Halcyon Docs
site_description: store
site_author: halcyon

repo_name: halcyon
repo_url: https://github.com/hhhhalcyon/hhhhalcyon.github.io

theme:
  name: material

  language: zh

  logo: assets/logo.png

  favicon: assets/logo.png

  palette:

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo

  features:

    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.top
    - navigation.indexes
    - navigation.tracking

    - toc.follow
    - toc.integrate

    - search.suggest
    - search.highlight

    - content.code.copy

    - content.tabs.link

    - content.action.edit

    - content.action.view

plugins:

  - search

markdown_extensions:

  - admonition

  - tables

  - footnotes

  - attr_list

  - pymdownx.details

  - pymdownx.superfences

  - pymdownx.highlight

  - pymdownx.inlinehilite

  - pymdownx.tabbed

  - pymdownx.arithmatex

extra_css:

  - stylesheets/extra.css

extra:

  social:

    - icon: fontawesome/brands/github
      link: https://github.com/hhhhalcyon

nav:

  - 首页: index.md

  - 文章:
      - 须知:
          - index: article/须知/index.md
      - 2023: 
          - 新年献词丨每一次的拥抱都以松手告终: article/2023/01.md
          - 再见保尔：左方和他的《南方周末》时代: article/2023/02.md
      - 2024:
          - 悼法学泰斗江平：呐喊者转身，金石留此声: article/2024/01.md
          - 回顾20篇江平媒体专访，尺度之大，宛若梦中: article/2024/02.md
      - 2025:
          - 在怀疑的时代依然需要信仰: article/2025/01.md
      - 2026:
          - 俞吾金：决定论与自由意志关系新探: article/2026/01.md

  - 原创:
      - 01: original/01.md

  - 关于我: about.md