site_name: Hal's Store
site_description: store
site_author: halcyon

repo_name: halcyon
repo_url: https://github.com/hhhhalcyon/hhhhalcyon.github.io

theme:
  name: material

  language: zh

  logo: assets/logo.png

  favicon: assets/logo.png

  palette:

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo

  features:

    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.top
    - navigation.indexes
    - navigation.tracking

    - toc.follow
    - toc.integrate

    - search.suggest
    - search.highlight

    - content.code.copy

    - content.tabs.link

    - content.action.edit

    - content.action.view

plugins:

  - search

markdown_extensions:

  - admonition

  - tables

  - footnotes

  - attr_list

  - pymdownx.details

  - pymdownx.superfences

  - pymdownx.highlight

  - pymdownx.inlinehilite

  - pymdownx.tabbed

  - pymdownx.arithmatex

extra_css:

  - stylesheets/extra.css

extra:

  social:

    - icon: fontawesome/brands/github
      link: https://github.com/hhhhalcyon

